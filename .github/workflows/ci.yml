name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sL -o /usr/bin/jq.exe https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-windows-amd64.exe
          chmod +x /usr/bin/jq.exe

      - name: Verify prerequisites
        shell: bash
        run: |
          bash --version | head -1
          curl --version | head -1
          git --version
          jq --version

      - name: Run test-config
        shell: bash
        run: bash tests/test-config.sh

      - name: Run test-cred
        shell: bash
        run: bash tests/test-cred.sh

      - name: Run test-api
        shell: bash
        run: bash tests/test-api.sh

      - name: Run test-docs-check
        shell: bash
        run: bash tests/test-docs-check.sh

      - name: Run test-security
        shell: bash
        run: bash tests/test-security.sh
